name: pretraining-with-human-feedback-1k
desc: pretraining-with-human-feedback 1k steps
cmd: python train.py --task configs/toxicity/pretrain.yml --method configs/toxicity/conditional.yml --override training.max_steps=1000 training.eval_steps=500

env:
  python:
    type: manual
    version: 3.10
    requirements-file: requirements-datasphere.txt
    local-paths:
      - train.py
      - apo/

inputs:
  - configs/
  - resources/
  - requirements-datasphere.txt

outputs:
  - training_output/
  - comet_logs/

cloud-instance-types:
  - g2.1
